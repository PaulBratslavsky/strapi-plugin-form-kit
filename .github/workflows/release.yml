name: Release plugin to npm

# Publishes strapi-plugin-form-kit to npm when a version tag is pushed.
# Workflow:
#   1. Locally bump packages/plugin/package.json (e.g. 0.2.1 → 0.2.2)
#   2. git commit, then `git tag v0.2.2 && git push --tags`
#   3. This workflow builds, verifies, and publishes
#
# Required GitHub secret:
#   NPM_TOKEN — an "Automation" token from npmjs.com (Settings → Access Tokens).
#               Bypasses 2FA on publishes.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch: # allow manual triggers from the Actions tab

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build & verify
        working-directory: packages/plugin
        run: |
          pnpm run build
          pnpm run verify

      - name: Publish
        working-directory: packages/plugin
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
